---
driver:
  name: vagrant

verifier:
  name: inspec

transport:
  name: rsync

provisioner:
  name: chef_infra
  product_name: cinc
  product_version: '19'
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true
  data_bags_path: test/integration/data_bags

platforms:
  - name: almalinux-10

suites:
  - name: default
    run_list:
      - recipe[proj-cinc::default]
  - name: rubygems
    run_list:
      - recipe[proj-cinc::rubygems]
    verifier:
      controls:
        - rubygems
